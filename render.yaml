services:
  # ── FastAPI Backend ────────────────────────────────────────────
  - type: web
    name: deepdive-api
    runtime: python
    pythonVersion: "3.11"
    rootDir: backend
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: bash -c "uvicorn main:app --host 0.0.0.0 --port $PORT"
    plan: free
    envVars:
      - key: HUGGINGFACE_API_TOKEN
        sync: false
      - key: FRONTEND_URL
        sync: false
      # Qdrant Cloud — free hosted vector DB (never pauses, no credit card)
      # Sign up: https://cloud.qdrant.io → create free cluster → copy URL + API key
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      # /tmp is fine — PDFs are only needed during inline processing, then discarded
      - key: UPLOAD_DIR
        value: /tmp/uploads
      # Celery disabled: worker runs in a separate container with no access to
      # this service's filesystem. Processing runs inline in the web service.
      - key: USE_CELERY
        value: "false"
